<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>
    <script src="js/domicili.js"></script>
    <script src="js/persona.js"></script>
</head>
    <body>
        <Script>
          // Crear una instancia de Direccion
          var dir = new Domicili("mayor",5,"Madrid");
          var juan = new Persona("Juan",34,"Hombre", dir);
          document.write(juan.mostrar() + "<br/>");

          var dir2 = new Domicili("sol",15,"Carballo");
          var maria = new Persona("Maria",56,"Mujer", dir2);
          document.write(maria.mostrar() + "<br/>");

          document.write(maria.getDomicili().getPoblacion() + "<br/>");

        </Script>
    </body>
