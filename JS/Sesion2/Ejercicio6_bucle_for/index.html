<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bucles for</title>
</head>
<body>
    <H1>CONSULTE LA CONSOLA PARA COMPROBAR RESULTADOS</H1>
    <script>
        //Mostrar los numero del 1 al 10
        for(let num = 1; num <=10; num++) {
            console.log(num);
        }

        //Mostrar los numeros del 10 al 1
        for(let num2 = 10; num2 >=1; num2--) {
            console.log(num2);
        }

        // Mostrar los numero del 0 al 50 de 5 en 5
        for(let num3 = 0; num3 <=50; num3+=5) {
            console.log(num3);
        }

        //for in
        let nombres = ["Juan", "Pedro","Maria"]; //indices: 0,1,2
        for (let indice in nombres){
            console.log(nombres[indice]);
        }

        //for of
        for (let nombre of nombres){
            console.log(nombre);
        }

    </script>
</body>
</html>
