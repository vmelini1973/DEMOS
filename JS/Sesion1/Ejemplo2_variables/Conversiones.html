<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversiones</title>
</head>
<body>
    <script>
        //parsefloat
        document.write(parseFloat("78.34") + "<br/>");
        document.write(parseFloat("78.34thjghjfhjgk") + "<br/>");
        document.write(parseFloat("78.3jkhjkhkjhkj4") + "<br/>");
        document.write(parseFloat("pepito") + "<br/>");

        //parseInt
        document.write(parseInt("78.34") + "<br/>");
        document.write(parseInt("7834") + "<br/>");
        document.write(parseInt("78hhhhhhhhh4") + "<br/>");

        document.write(parseInt("7834", 16) + "<br/>");
        document.write(parseInt("7834", 10) + "<br/>");
        document.write(parseInt("7834", 8) + "<br/>");
        document.write(parseInt("0101010101", 2) + "<br/>");

        //toString
        numero = 7845;
        document.write(numero.toString() + "<br/>");
        document.write(numero.toString(16) + "<br/>");
        document.write(numero.toString(10) + "<br/>");
        document.write(numero.toString(8) + "<br/>");
        document.write(numero.toString(2) + "<br/>");


    </script>    
</body>
</html>
