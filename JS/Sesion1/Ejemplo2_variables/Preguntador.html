<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pregunta y Suma</title>
</head>
<body>
    <script>
    // Conversiones Explicitas
    var Numero1= parseInt(window.prompt("Introduce un número"));
    var Numero2= parseInt(window.prompt("Introduce otro numero"));
        document.write("Enhorabuena. Usted ha conseguido sumar " + Numero1 + " y " + Numero2 + ".");
        document.write(" Y ahora sabe que su suma es: " + (Numero1 + Numero2));
    </script>
  
</body>
</html>
