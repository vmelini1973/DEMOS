<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="/Sesion6/ejemplo19_Formularios/js/codigo.js"></script>

</head>
<body>
    <form id="formulario" action="">
        <fieldset>
            <legend>Datos Personales</legend>
            <label for="nombre">Nombre:</label>
            <input type="text" name="nombre" id="nombre" /> <br/>

        
            <label for="password">Password:</label>
            <input type="pw" name="password" id="password" /> <br/>

          
            
            <label for="apellido">Apellido:</label>
            <input type="text" name="apellido" id="apellido" list="apellidoslist" /> <br/>
           
            <datalist id="apellidoslist">
                <option value="Lopez">Lopez</option>
                <option value="Lara">Lara</option>
                <option value="Laiz">Laiz</option>
                <option value="Sanz">Sanz</option>
                <option value="Melini">Melini</option>
                <option value="Sánchez">Sánchez</option>
            </datalist>

            <label for="edad">Edad:</label>
            <input type="number" name="edad" id="edad" min="0" max="110" /> <br/>

            <label for="email">E-mail:</label>
            <input type="email" name="email" id="email"/> <br/>

            <label for="web">Web:</label>
            <input type="url" name="web" id="web"/> <br/>

            <label for="telefono">Telefono:</label>
            <input type="tel" name="telefono" id="telefono"/> <br/>

            <label for="nacimiento">Fecha de Nacimiento:</label>
            <input type="date" name="nacimiento" id="nacimiento"/> <br/>

            <label for="Sexo:">Sexo</label>
            <input type="radio" name="sexo" id="sexo" value="hombre" /> <label> Hombre</label>
            <input type="radio" name="sexo" id="sexo" value="mujer" /> <label> Mujer</label> <br/>
        </fieldset>

            <fieldset>
                <legend>Datos Academicos</legend>

                <label for="estudios">Estudios:</label>
                    <select name="estudios" id="estudios">
                        <option value="sinestudios">Sin Estudios</option>
                        <option value="primaria">primaria</option>
                        <option value="eso">ESO</option>
                        <option value="superior">Superior</option>
                        <option value="grado">Grado</option>
                    </select><br/>

                <label for="cursos">Cursos:</label>
                    <select name="cursos" id="cursos" multiple="multiple">
                        <option value="ofimatica">ofimatica</option>
                        <option value="html">HTML</option>
                        <option value="css">Css</option>
                        <option value="angular">Angular</option>
                        <option value="react">React</option>
                    </select><br/>
            </fieldset><br/>
            
            <input type="submit" value="Enviar" onclick="mostrar()" />
            <input type="reset" value="Limpiar" />
            
     
      </form> 

</body>
</html>
