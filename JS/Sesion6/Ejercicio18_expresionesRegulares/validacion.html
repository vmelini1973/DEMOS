<body>
    <script>
        var Lista = [
            "+56-2-24215300",
            "+56 2 24215300",
            "+56-2 24215300",
            "+56 2-24215300",
            "+56-2-2421530",
            "+56-2-242153000",
            "+34-2-24215300",
            "+56-2-24215A00"];
        var exp = /^\+56(\-2\-| 2 )\d{8}$/;
        for (m of Lista) {
            if (exp.test(m)) {
            document.write(m + " es correcto");
            } else { 
                document.write(m + " es incorrecto, ");}
           
        }

    </script>
</body>
